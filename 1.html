<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
}

canvas{
    background:linear-gradient(#111,#222);
    display:block;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    z-index:10;
}

#creativeText{
    position:absolute;
    top:50px;
    left:10px;
    color:#00ffff;
    font-size:22px;
    display:none;
    text-shadow:0 0 10px cyan;
    font-family:Arial;
}

#toolbar{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    gap:10px;
    z-index:10;
}

.tool{
    padding:10px 20px;
    background:#00aaff;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 10px cyan;
}
</style>
</head>
<body>

<div id="info">SPACE = SPRINGEN | 1 = CREATIVE MODE</div>
<div id="creativeText">CREATIVE MODE</div>

<div id="toolbar">
    <button class="tool" onclick="selected='block'">BLOCK</button>
    <button class="tool" onclick="selected='slab'">SLAB</button>
    <button class="tool" onclick="selected='jump'">JUMP PAD</button>
    <button class="tool" onclick="selected='spike'">STACHELN</button>
    <button class="tool" onclick="selected='start'">START</button>
    <button class="tool" onclick="selected='goal'">ZIEL</button>
    <button class="tool" onclick="selected='delete'">LÖSCHEN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.8;
let creative = false;
let selected = 'block';
let startPoint = {x:150,y:300};
let goalPoint = {x:3000,y:300};

const player = {
    x:150,
    y:300,
    size:40,
    velY:0,
    grounded:false,
    speed:6
};

let objects = JSON.parse(localStorage.getItem('level1')) || [];

function saveLevel(){
    localStorage.setItem('level1', JSON.stringify(objects));
}

window.addEventListener('keydown',(e)=>{

    if(e.code === 'Space'){
        if(player.grounded){
            player.velY = -14;
        }
    }

    if(e.key === '1'){

        if(!creative){
            const pin = prompt('PIN eingeben');

            if(pin === '081508151235180Rss#'){
                creative = true;
                document.getElementById('toolbar').style.display='flex';
                document.getElementById('creativeText').style.display='block';
            }
        }else{
            creative = false;
            document.getElementById('toolbar').style.display='none';
            document.getElementById('creativeText').style.display='none';
            saveLevel();
        }
    }
});

canvas.addEventListener('click',(e)=>{

    if(!creative) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if(selected === 'delete'){

        objects = objects.filter(obj=>!(
            x > obj.x &&
            x < obj.x+60 &&
            y > obj.y &&
            y < obj.y+60
        ));

        saveLevel();
        return;
    }

    if(selected === 'start'){
        startPoint = {x,y};
        player.x = x;
        player.y = y;
        saveLevel();
        return;
    }

    if(selected === 'goal'){
        goalPoint = {x,y};
        saveLevel();
        return;
    }

    objects.push({
        x,y,
        type:selected
    });

    saveLevel();
});

function drawPlayer(){

    if(creative) return;

    ctx.fillStyle = '#00ffff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00ffff';
    ctx.fillRect(player.x,player.y,player.size,player.size);
    ctx.shadowBlur = 0;
}

function drawObjects(){

    ctx.fillStyle = 'lime';
    ctx.fillRect(startPoint.x,startPoint.y,50,50);

    ctx.fillStyle = 'gold';
    ctx.fillRect(goalPoint.x,goalPoint.y,50,80);

    for(let obj of objects){

        if(obj.type === 'block'){
            ctx.fillStyle = '#00aaff';
            ctx.fillRect(obj.x,obj.y,60,60);
        }

        if(obj.type === 'slab'){
            ctx.fillStyle = '#55ccff';
            ctx.fillRect(obj.x,obj.y,60,30);
        }

        if(obj.type === 'jump'){
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(obj.x,obj.y,60,20);
        }

        if(obj.type === 'spike'){
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.moveTo(obj.x,obj.y+60);
            ctx.lineTo(obj.x+30,obj.y);
            ctx.lineTo(obj.x+60,obj.y+60);
            ctx.fill();
        }
    }
}

function collisions(){

    player.grounded = false;

    for(let obj of objects){

        let w = 60;
        let h = 60;

        if(obj.type === 'slab') h = 30;
        if(obj.type === 'jump') h = 20;

        if(obj.type !== 'spike'){
            if(player.x < obj.x+w &&
               player.x+player.size > obj.x &&
               player.y < obj.y+h &&
               player.y+player.size > obj.y){

                if(player.velY >= 0){
                    player.y = obj.y-player.size;
                    player.velY = 0;
                    player.grounded = true;

                    if(obj.type === 'jump'){
                        player.velY = -20;
                    }
                }
            }
        }

        if(obj.type === 'spike'){
            if(player.x < obj.x+60 &&
               player.x+player.size > obj.x &&
               player.y < obj.y+60 &&
               player.y+player.size > obj.y){

                respawn();
            }
        }
    }
}

function respawn(){
    player.x = startPoint.x;
    player.y = startPoint.y;
    player.velY = 0;
}

function update(){

    player.x += player.speed;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle='white';
    ctx.font='30px Arial';

    let progress = Math.floor((player.x/goalPoint.x)*100);

    if(progress > 100) progress = 100;

    ctx.fillText('FORTSCHRITT: '+progress+'%',20,40);

    player.velY += gravity;
    player.y += player.velY;

    if(player.y > canvas.height-80){
        player.y = canvas.height-80;
        player.velY = 0;
        player.grounded = true;
    }

    collisions();

    drawObjects();
    drawPlayer();

    if(player.x > goalPoint.x){
        alert('LEVEL GESCHAFFT');
        respawn();
    }

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
